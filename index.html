<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>So Richard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { softpink:'#fce7f3', softblue:'#e0f2fe', primary:'#ec4899', secondary:'#0ea5e9', coin:'#f59e0b' } } } }
    </script>
    <style>
        body { font-family:'Kanit',sans-serif; -webkit-tap-highlight-color:transparent; }
        .page-content { display:none; animation:fadeIn 0.3s; }
        .page-content.active { display:block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .loader { border:3px solid #f3f3f3; border-top:3px solid #ec4899; border-radius:50%; width:20px; height:20px; animation:spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    </style>
</head>
<body class="bg-softpink text-gray-800 min-h-screen relative pb-24">

    <div id="auth-screen" class="fixed inset-0 bg-softpink z-50 flex flex-col items-center justify-center">
        <img src="https://img1.pic.in.th/images/quality_restoration_256903162035100561f6c839e7773145a.png" class="w-32 h-32 rounded-full mb-6 bg-white object-cover shadow-lg">
        <div class="bg-white p-6 rounded-3xl shadow-sm w-80 text-center">
            <input type="password" id="auth-pass" class="w-full bg-softblue rounded-xl p-3 mb-4 text-center outline-none" placeholder="รหัสผ่าน">
            <button onclick="checkAuth()" class="w-full bg-primary text-white rounded-xl py-3 font-medium shadow-md">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/40 z-[80] hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h3 class="font-bold text-lg text-primary mb-4"><i class="fa-solid fa-pen-to-square mr-2"></i>แก้ไขทีม</h3>
            <div class="space-y-3">
                <input type="hidden" id="e-id">
                <input type="email" id="e-email" class="w-full bg-softpink/30 rounded-xl p-3 text-sm outline-none" placeholder="อีเมลหัวทีม">
                <input type="date" id="e-date" class="w-full bg-softpink/30 rounded-xl p-3 text-sm outline-none">
                <input type="text" id="e-seller" class="w-full bg-softpink/30 rounded-xl p-3 text-sm outline-none" placeholder="ชื่อผู้ขาย">
                <input type="text" id="e-app" class="w-full bg-softpink/30 rounded-xl p-3 text-sm outline-none" placeholder="ชื่อแอพ">
                <select id="e-max" class="w-full bg-softpink/30 rounded-xl p-3 text-sm outline-none">
                    <option value="4">ลูกทีมสูงสุด 4 คน</option>
                    <option value="1">ลูกทีมสูงสุด 1 คน</option>
                    <option value="5">ลูกทีมสูงสุด 5 คน</option>
                    <option value="10">ลูกทีมสูงสุด 10 คน</option>
                </select>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeEditModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-medium">ยกเลิก</button>
                <button onclick="updateTeam()" class="flex-1 bg-primary text-white py-3 rounded-xl font-medium shadow-md">บันทึก</button>
            </div>
        </div>
    </div>

    <header class="glass sticky top-0 z-40 p-4 shadow-sm flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://img1.pic.in.th/images/quality_restoration_256903162035100561f6c839e7773145a.png" class="w-10 h-10 rounded-full border-2 border-primary object-cover">
            <h1 class="font-bold text-lg text-primary">So Richard</h1>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="page-1" class="page-content active">
             <div id="dash-content">กำลังโหลดข้อมูล...</div>
        </div>

        <div id="page-2" class="page-content">
            <div class="bg-white p-5 rounded-3xl shadow-sm mb-6 border-b-4 border-primary">
                <h2 class="text-lg font-bold mb-4 text-primary"><i class="fa-solid fa-plus-circle mr-2"></i> สร้างทีมใหม่</h2>
                <form id="team-form" onsubmit="submitTeam(event)" class="space-y-3">
                    <input type="email" id="f-email" required placeholder="อีเมลหัวทีม" class="w-full bg-softpink/50 rounded-xl p-3 text-sm outline-none">
                    <input type="date" id="f-date" required class="w-full bg-softpink/50 rounded-xl p-3 text-sm outline-none">
                    <input type="text" id="f-seller" required placeholder="ชื่อผู้ขาย" class="w-full bg-softpink/50 rounded-xl p-3 text-sm outline-none">
                    <input type="text" id="f-app" required placeholder="ชื่อแอพ" class="w-full bg-softpink/50 rounded-xl p-3 text-sm outline-none">
                    <div class="flex items-center gap-2 bg-softpink/50 rounded-xl p-1 px-3">
                        <span class="text-xs text-gray-500 flex-1">จำนวนลูกทีม:</span>
                        <select id="f-max" class="bg-transparent text-sm font-bold text-primary py-2 outline-none">
                            <option value="4">4 คน</option>
                            <option value="1">1 คน</option>
                            <option value="5">5 คน</option>
                            <option value="10">10 คน</option>
                        </select>
                    </div>
                    <button type="submit" id="btn-save-team" class="w-full bg-primary text-white rounded-xl py-3 font-medium shadow-md mt-2">
                        <i class="fa-solid fa-save mr-2"></i> บันทึกข้อมูล
                    </button>
                </form>
            </div>
            <h2 class="text-lg font-bold mb-4 text-gray-700"><i class="fa-solid fa-user-plus text-secondary mr-2"></i> เพิ่มเมลลูกทีม</h2>
            <div id="recent-teams-container" class="space-y-3"></div>
        </div>

        <div id="page-3" class="page-content">
            <div id="all-teams-container" class="space-y-3"></div>
        </div>
    </main>

    <nav class="glass fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 flex justify-around p-3 pb-6 z-40 rounded-t-3xl shadow-lg border-t border-pink-100">
        <button onclick="switchTab(1)" class="w-12 h-12 flex flex-col items-center justify-center text-gray-400"><i class="fa-solid fa-house"></i><span class="text-[9px]">Dashboard</span></button>
        <button onclick="switchTab(2)" class="w-12 h-12 flex flex-col items-center justify-center text-primary bg-white rounded-full shadow relative -top-3"><i class="fa-solid fa-plus text-2xl"></i><span class="text-[9px]">จัดการ</span></button>
        <button onclick="switchTab(3)" class="w-12 h-12 flex flex-col items-center justify-center text-gray-400"><i class="fa-solid fa-list-ul"></i><span class="text-[9px]">ทีมทั้งหมด</span></button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwZi5TkBXTtISRBU1Jvxi4LMqRF5EDUm_7NApd8Z9tQAEPZXgQElmdZAgvmXgbu_wbVXA/exec";
        let globalTeams = [];

        // Auth Logic
        function checkAuth() {
            if(document.getElementById('auth-pass').value === 'so') {
                sessionStorage.setItem('so_auth','true');
                document.getElementById('auth-screen').style.display = 'none';
                initApp();
            }
        }
        window.onload = () => { if(sessionStorage.getItem('so_auth') === 'true') { document.getElementById('auth-screen').style.display='none'; initApp(); } };

        function initApp() { loadDashboard(); loadTeams(); }

        async function apiCall(action, data={}) {
            const res = await fetch(API_URL, { method:'POST', body:JSON.stringify({action, data}) });
            return await res.json();
        }

        // --- เพิ่มเติมส่วนลบและแก้ไข ---

        async function deleteTeam(teamId) {
            if(!confirm("คุณเจคแน่ใจไหมครับว่าต้องการลบทีมนี้?")) return;
            const res = await apiCall('deleteTeam', {teamId});
            if(res.status === 'success') {
                alert("ลบทีมเรียบร้อยแล้วครับ");
                initApp();
            }
        }

        function openEditModal(teamId) {
            const t = globalTeams.find(x => x.ID === teamId);
            if(!t) return;
            document.getElementById('e-id').value = t.ID;
            document.getElementById('e-email').value = t.HeadEmail;
            document.getElementById('e-date').value = t.StartDate.split('T')[0];
            document.getElementById('e-seller').value = t.Seller;
            document.getElementById('e-app').value = t.AppName;
            document.getElementById('e-max').value = t.MaxMembers || 4;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function updateTeam() {
            const data = {
                teamId: document.getElementById('e-id').value,
                headEmail: document.getElementById('e-email').value,
                startDate: document.getElementById('e-date').value,
                seller: document.getElementById('e-seller').value,
                appName: document.getElementById('e-app').value,
                maxMembers: document.getElementById('e-max').value
            };
            const res = await apiCall('editTeam', data);
            if(res.status === 'success') {
                closeEditModal();
                initApp();
            }
        }

        async function submitTeam(e) {
            e.preventDefault();
            const data = {
                headEmail: document.getElementById('f-email').value,
                startDate: document.getElementById('f-date').value,
                seller: document.getElementById('f-seller').value,
                appName: document.getElementById('f-app').value,
                maxMembers: document.getElementById('f-max').value
            };
            const res = await apiCall('saveTeam', data);
            if(res.status === 'success') { 
                document.getElementById('team-form').reset();
                initApp();
            }
        }

        // --- Render UI ---
        function renderTeams() {
            const recent = document.getElementById('recent-teams-container');
            const all = document.getElementById('all-teams-container');
            recent.innerHTML = ''; all.innerHTML = '';

            globalTeams.forEach(t => {
                let subsCount = 0;
                for(let i=1; i<=10; i++) if(t['Sub'+i]) subsCount++;
                const max = t.MaxMembers || 4;

                // หน้าจัดการ (Add Sub + Delete)
                recent.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm relative">
                        <button onclick="deleteTeam('${t.ID}')" class="absolute top-4 right-4 text-red-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                        <p class="text-xs text-primary font-bold"><i class="fa-solid fa-star mr-1"></i>${t.HeadEmail}</p>
                        <p class="text-[10px] text-gray-400 mb-3">แอป: ${t.AppName} (${subsCount}/${max} คน)</p>
                        ${subsCount < max ? `
                        <div class="flex gap-2">
                            <input type="email" id="in-${t.ID}" placeholder="เพิ่มเมลลูกทีม" class="flex-1 bg-gray-50 rounded-xl px-3 py-2 text-xs outline-none">
                            <button onclick="addSubEmail('${t.ID}')" class="bg-secondary text-white px-4 rounded-xl"><i class="fa-solid fa-plus"></i></button>
                        </div>` : `<p class="text-center text-[10px] text-red-400 py-1 bg-red-50 rounded-lg">ทีมเต็มแล้ว</p>`}
                    </div>
                `;

                // หน้าทีมทั้งหมด (View + Edit)
                all.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center justify-between">
                        <div class="truncate pr-4">
                            <p class="font-bold text-sm text-gray-700 truncate">${t.HeadEmail}</p>
                            <p class="text-[10px] text-gray-400">ผู้ขาย: ${t.Seller} | เริ่ม: ${new Date(t.StartDate).toLocaleDateString('th-TH')}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="openEditModal('${t.ID}')" class="text-secondary"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteTeam('${t.ID}')" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // [Other functions loadDashboard, addSubEmail, switchTab remain similar but updated to use API URL and data structures]
    </script>
</body>
</html>
